version: '3.8'

services:
  # --- API GATEWAY & BACKEND ---
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: stream_api
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - DATABASE_URL=postgresql://stream_user:stream_pass@db:5432/stream_db
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=minio_admin
      - S3_SECRET_KEY=minio_pass
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
      - minio

  # --- BANCO DE DADOS (Persistência) ---
  db:
    image: postgres:15-alpine
    container_name: stream_db
    restart: always
    environment:
      POSTGRES_USER: stream_user
      POSTGRES_PASSWORD: stream_pass
      POSTGRES_DB: stream_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # --- FILA DE JOBS (Redis) ---
  redis:
    image: redis:7-alpine
    container_name: stream_redis
    restart: always
    command: redis-server --appendonly yes

  # --- STORAGE DE MÍDIA (S3 Local/MinIO) ---
  minio:
    image: minio/minio
    container_name: stream_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_pass
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # --- REVERSE PROXY (SSL/Nginx) ---
  nginx:
    image: nginx:alpine
    container_name: stream_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
